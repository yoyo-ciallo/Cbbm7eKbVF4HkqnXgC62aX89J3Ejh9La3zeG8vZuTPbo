# ==========================================
# OpenAI Auto Register GitHub Actions Workflow
# ==========================================
#
# Setup: Repository Settings → Secrets → Actions
# - PROXY: Your proxy URL
#
# Usage:
# - Manual: Actions → Run workflow
# - Schedule: Daily at UTC 00:00
#
# ==========================================

name: OpenAI Auto Register

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - curl
          - dpdns
      run_once:
        description: 'Run only once'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    - cron: '0 0 * * *'

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl_cffi requests

      # ========================
      # Run curl script
      # ========================
      - name: Run curl script
        if: github.event.inputs.script == 'curl' || github.event.inputs.script == 'both' || github.event_name == 'schedule'
        run: python yoyo_auto_openai_register_V3.5-curl.py --once ${{ secrets.PROXY != '' && format('--proxy {0}', secrets.PROXY) || '' }}

      # ========================
      # Run dpdns script
      # ========================
      - name: Run dpdns script
        if: github.event.inputs.script == 'dpdns' || github.event.inputs.script == 'both' || github.event_name == 'schedule'
        run: python yoyo_auto_openai_register_V3.5-curl-dpdns.py --once ${{ secrets.PROXY != '' && format('--proxy {0}', secrets.PROXY) || '' }}

      # ========================
      # Upload tokens as artifact
      # ========================
      - name: Upload tokens as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-tokens
          path: token/
          retention-days: 30
          if-no-files-found: ignore
