# ==========================================
# OpenAI Auto Register GitHub Actions Workflow
# ==========================================

name: OpenAI Auto Register

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests

      - name: Run curl script
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          PROXY_ARG=""
          if [ -n "$PROXY" ]; then
            PROXY_ARG="--proxy $PROXY"
          fi
          python yoyo_auto_openai_register_V3.5-curl.py --once $PROXY_ARG

      - name: Run dpdns script
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          PROXY_ARG=""
          if [ -n "$PROXY" ]; then
            PROXY_ARG="--proxy $PROXY"
          fi
          python yoyo_auto_openai_register_V3.5-curl-dpdns.py --once $PROXY_ARG

      - name: Upload tokens as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-tokens
          path: token/
          retention-days: 30
          if-no-files-found: ignore
