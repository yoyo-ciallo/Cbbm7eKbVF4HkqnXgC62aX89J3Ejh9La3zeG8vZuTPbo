# ==========================================
# OpenAI Auto Register GitHub Actions Workflow
# ==========================================
#
# This workflow automatically runs the OpenAI registration scripts
# and saves generated tokens.
#
# Setup Required:
# 1. Go to Repository Settings → Secrets and variables → Actions
# 2. Add the following secrets:
#    - PROXY: Your proxy URL (e.g., http://127.0.0.1:7890)
#    - WORKER_API_KEY: Your Cloudflare Worker API key
#
# Usage:
# - Manual: Go to Actions → "OpenAI Auto Register" → "Run workflow"
# - Scheduled: Runs daily at 00:00 UTC
#
# Token Storage:
# - By default: Saved as GitHub Artifacts (RECOMMENDED - safer)
# - To commit to repo: Uncomment the "Commit tokens" step below
#   WARNING: Tokens in git history is a security risk!
#
# ==========================================

name: OpenAI Auto Register

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - curl
          - dpdns
      proxy:
        description: 'Proxy URL (optional, uses secret if empty)'
        required: false
        default: ''
      run_once:
        description: 'Run only once (not loop)'
        type: boolean
        default: true

  # Scheduled trigger - run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. Checkout code
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 2. Setup Python
      # ==========================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==========================================
      # 3. Install dependencies
      # ==========================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests

      # ==========================================
      # 4. Determine run mode
      # ==========================================
      - name: Set run mode
        id: run_mode
        run: |
          # Default values
          SCRIPT="both"
          RUN_ONCE="true"
          PROXY_ARG=""
          
          # Determine which scripts to run
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SCRIPT="${{ github.event.inputs.script }}"
            
            # Determine run_once - checkbox returns "true" when checked
            INPUT_RUN_ONCE="${{ github.event.inputs.run_once }}"
            if [ "$INPUT_RUN_ONCE" == "true" ]; then
              RUN_ONCE="true"
            else
              RUN_ONCE="false"
            fi
            
            # Determine proxy
            INPUT_PROXY="${{ github.event.inputs.proxy }}"
            SECRET_PROXY="${{ secrets.PROXY }}"
            
            if [ -n "$INPUT_PROXY" ] && [ "$INPUT_PROXY" != "null" ]; then
              PROXY_ARG="--proxy $INPUT_PROXY"
            elif [ -n "$SECRET_PROXY" ]; then
              PROXY_ARG="--proxy $SECRET_PROXY"
            fi
          fi
          
          echo "script=$SCRIPT" >> $GITHUB_OUTPUT
          echo "run_once=$RUN_ONCE" >> $GITHUB_OUTPUT
          echo "proxy=$PROXY_ARG" >> $GITHUB_OUTPUT

      # ==========================================
      # 5. Run OpenAI Registration Script (curl)
      # ==========================================
      - name: Run curl script
        if: steps.run_mode.outputs.script == 'curl' || steps.run_mode.outputs.script == 'both'
        run: |
          RUN_ONCE="${{ steps.run_mode.outputs.run_once }}"
          PROXY_ARG="${{ steps.run_mode.outputs.proxy }}"
          
          if [[ "$RUN_ONCE" == "true" ]]; then
            python yoyo_auto_openai_register_V3.5-curl.py --once $PROXY_ARG
          else
            python yoyo_auto_openai_register_V3.5-curl.py $PROXY_ARG
          fi

      # ==========================================
      # 6. Run OpenAI Registration Script (dpdns)
      # ==========================================
      - name: Run dpdns script
        if: steps.run_mode.outputs.script == 'dpdns' || steps.run_mode.outputs.script == 'both'
        run: |
          RUN_ONCE="${{ steps.run_mode.outputs.run_once }}"
          PROXY_ARG="${{ steps.run_mode.outputs.proxy }}"
          
          if [[ "$RUN_ONCE" == "true" ]]; then
            python yoyo_auto_openai_register_V3.5-curl-dpdns.py --once $PROXY_ARG
          else
            python yoyo_auto_openai_register_V3.5-curl-dpdns.py $PROXY_ARG
          fi

      # ==========================================
      # 7. Upload tokens as Artifact (RECOMMENDED)
      # ==========================================
      - name: Upload tokens as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-tokens
          path: token/
          retention-days: 30
          if-no-files-found: ignore

      # ==========================================
      # 8. Upload workflow logs
      # ==========================================
      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs
          path: |
            ${{ runner.temp }}/_runner.log
            ${{ github.workspace }}/*.log
          retention-days: 7
          if-no-files-found: ignore
