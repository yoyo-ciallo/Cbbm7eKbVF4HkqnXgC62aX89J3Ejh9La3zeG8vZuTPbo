# ==========================================
# OpenAI Auto Register - Loop Mode
# ==========================================
# Runs in continuous loop

name: OpenAI Register (Loop)

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - curl
          - dpdns

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl_cffi requests

      - name: Run curl script (loop)
        if: github.event.inputs.script == 'curl' || github.event.inputs.script == 'both'
        run: python yoyo_auto_openai_register_V3.5-curl.py

      - name: Run dpdns script (loop)
        if: github.event.inputs.script == 'dpdns' || github.event.inputs.script == 'both'
        run: python yoyo_auto_openai_register_V3.5-curl-dpdns.py

      - name: Upload tokens as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-tokens-loop
          path: token/
          retention-days: 30
          if-no-files-found: ignore
